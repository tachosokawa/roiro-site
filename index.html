<!DOCTYPE html>
<html lang="ja">
<head>
  <!-- ROIRO -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>ROIRO｜準備中</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Arvo:wght@400;700&family=Zen+Kaku+Gothic+New:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --sumi:#3B322C; --kinari:#F5F1E8; --hi:#F47A4E; --renga01:#522614;
      --font-en:"Arvo",serif; --font-ja:"Zen Kaku Gothic New",sans-serif;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    html,body{height:100%;}
    body{
      background:var(--kinari); color:var(--sumi);
      font-family:var(--font-ja);
      display:flex; align-items:center; justify-content:center;
      min-height:100vh; text-align:center; padding:24px;
    }
    .wrap{ max-width:560px; }
    .logo{
      font-family:var(--font-en); font-weight:700;
      font-size:clamp(48px,12vw,88px); letter-spacing:0.08em;
      color:var(--sumi); line-height:1;
    }
    .rule{
      width:40px; height:3px; background:var(--hi);
      margin:28px auto; border-radius:2px;
    }
    .lead{
      font-size:clamp(15px,4vw,18px); font-weight:500;
      line-height:2; color:var(--sumi);
    }
    .status{
      margin-top:32px; font-family:var(--font-en);
      font-size:13px; letter-spacing:0.18em; font-weight:700;
      color:var(--renga01);
    }
    .open{
      margin-top:8px; font-family:var(--font-en);
      font-size:clamp(20px,6vw,28px); letter-spacing:0.12em; font-weight:700;
      color:var(--sumi);
    }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="logo">ROIRO</div>
    <div class="rule"></div>
    <p class="lead">炉を囲んで、はじまる。<br>みんなでつくる、新しい炉の広場。</p>
    <p class="status">COMING SOON</p>
    <p class="open">2026.09 OPEN</p>
  </main>
</body>
</html>
